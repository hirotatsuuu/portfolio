name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. pnpmのセットアップ（内蔵キャッシュ機能を有効化）
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # 3. 依存関係のインストール（ここで自動的にキャッシュが適用・保存されます）
      - name: Install dependencies
        run: pnpm install

      # 4. ビルド
      - name: Build
        run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment